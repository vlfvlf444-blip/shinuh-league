<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f6fb;color:#1a1a2e;min-height:100vh}
:root{
  --cp:#1a56a0;--cpl:#e6f1fb;--cpd:#0c3d78;
  --cw:#3B6D11;--cwb:#EAF3DE;
  --cl:#A32D2D;--clb:#FCEBEB;
  --cd:#185FA5;--cdb:#E6F1FB;
  --cy:#5F5E5A;--cyb:#F1EFE8;
  --cg:#BA7517;--cgb:#FAEEDA;
  --rain:#e24b4a;
}
.app{max-width:860px;margin:0 auto;padding:12px}
.hdr{background:#fff;border-radius:12px;padding:20px 16px 16px;margin-bottom:12px;border:0.5px solid #dde3f0;text-align:center}
.hdr h1{font-size:18px;font-weight:700;color:var(--cp);line-height:1.5}
.hdr p{font-size:12px;color:#666;margin-top:4px}
.mode-badge{display:inline-block;margin-top:8px;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px}
.mode-badge.admin{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.mode-badge.viewer{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:14px;padding:28px 24px;width:320px;max-width:90vw}
.modal h2{font-size:17px;font-weight:700;color:var(--cp);margin-bottom:6px}
.modal p{font-size:13px;color:#666;margin-bottom:18px;line-height:1.6}
.modal input{width:100%;padding:10px 12px;font-size:14px;border:1.5px solid #dde3f0;border-radius:8px;margin-bottom:10px;outline:none;font-family:inherit}
.modal input:focus{border-color:var(--cp)}
.modal .btn-row{display:flex;gap:8px}
.btn-primary{flex:1;padding:10px;font-size:14px;font-weight:700;background:var(--cp);color:#fff;border:none;border-radius:8px;cursor:pointer}
.btn-primary:hover{background:var(--cpd)}
.btn-secondary{flex:1;padding:10px;font-size:14px;font-weight:600;background:#f1f3f9;color:#555;border:1px solid #dde3f0;border-radius:8px;cursor:pointer}
.modal .err{font-size:12px;color:#c0392b;margin-bottom:8px;display:none}
.mode-selector{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:10px;border:0.5px solid #dde3f0;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mode-selector span{font-size:13px;color:#555;flex:1}
.btn-sm{padding:6px 14px;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;border:1px solid #dde3f0;font-family:inherit}
.btn-login{background:var(--cp);color:#fff;border-color:var(--cp)}
.btn-login:hover{background:var(--cpd)}
.btn-logout{background:#f1f3f9;color:#555}
.conn-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:#888;padding:6px 10px;background:#fff;border-radius:8px;margin-bottom:8px;border:0.5px solid #eee}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.conn-dot.ok{background:#4caf50}.conn-dot.err{background:#e53935}.conn-dot.loading{background:#ff9800}
.tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;background:#fff;border-radius:10px;padding:8px;border:0.5px solid #dde3f0}
.tab{flex:1;min-width:56px;padding:8px 4px;font-size:12px;font-weight:600;border:1.5px solid transparent;border-radius:8px;background:transparent;color:#666;cursor:pointer;font-family:inherit}
.tab.on{background:var(--cp);color:#fff}
.gbtn-row{display:flex;gap:6px;margin-bottom:10px}
.gbtn{flex:1;padding:8px;font-size:13px;font-weight:600;border:1.5px solid #dde3f0;border-radius:8px;background:#fff;color:#666;cursor:pointer;font-family:inherit}
.gbtn.on{background:var(--cpl);color:var(--cp);border-color:var(--cp)}
.sec-title{font-size:13px;font-weight:700;color:#1a1a2e;margin:12px 0 7px;padding-left:10px;border-left:3px solid var(--cp);display:flex;align-items:center;gap:6px}
.sec-title small{font-size:11px;font-weight:400;color:#888}
.std-wrap{background:#fff;border-radius:10px;border:0.5px solid #dde3f0;overflow:hidden;margin-bottom:12px}
.std-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.std-tbl th{background:var(--cp);color:#fff;padding:7px 4px;text-align:center;font-weight:600}
.std-tbl td{padding:7px 4px;text-align:center;border-bottom:0.5px solid #eef0f6}
.std-tbl tr:last-child td{border-bottom:none}
.std-tbl tr:nth-child(even) td{background:#f8faff}
.std-tbl .tnm{text-align:left;font-weight:600;padding-left:10px}
.r1{color:var(--cg);font-weight:700}.r2{color:#888780;font-weight:600}.r3{color:#854F0B;font-weight:600}
.glist{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.gc{background:#fff;border:0.5px solid #dde3f0;border-radius:10px;padding:10px 12px}
.gc.rained{border-color:var(--rain);border-width:1px}
.gc.done{border-left:3px solid var(--cw)}
.ghd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:6px;flex-wrap:wrap}
.gdate-area{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.gdate{font-size:12px;color:#555}
.gdate.changed{color:var(--rain);font-weight:600}
.gbadge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:700}
.b-pre{background:#e6f1fb;color:#185FA5}.b-fin{background:#FAEEDA;color:#BA7517}.b-sf{background:#FBEAF0;color:#993556}
.edit-btn{font-size:11px;padding:3px 8px;border:1px solid #dde3f0;border-radius:5px;background:#f8faff;color:#666;cursor:pointer;font-family:inherit}
.edit-btn:hover{background:#eef2ff;border-color:var(--cp);color:var(--cp)}
.restore-btn{font-size:10px;padding:2px 7px;border:1px solid #fdd;border-radius:5px;background:#fff5f5;color:var(--rain);cursor:pointer;font-family:inherit}
.date-edit-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;background:#f8faff;border-radius:8px;padding:8px 10px}
.date-input{font-size:13px;padding:5px 10px;border:1.5px solid #dde3f0;border-radius:6px;background:#fff;color:#1a1a2e;width:150px;font-family:inherit}
.date-input:focus{outline:none;border-color:var(--cp)}
.rain-chk{display:flex;align-items:center;gap:4px;font-size:12px;color:#666;cursor:pointer}
.save-btn{padding:5px 12px;font-size:12px;font-weight:700;background:var(--cp);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit}
.save-btn:hover{background:var(--cpd)}
.cancel-btn{padding:5px 10px;font-size:12px;background:#f1f3f9;color:#666;border:1px solid #dde3f0;border-radius:6px;cursor:pointer;font-family:inherit}
.gteams{display:flex;align-items:stretch;gap:8px;margin-bottom:8px}
.tb{flex:1;text-align:center;padding:8px 6px;border-radius:8px;background:#f4f6fb;border:1px solid #eef0f6}
.tb .cls{font-size:13px;font-weight:700;color:#333}
.tb .sc{font-size:20px;font-weight:700;margin-top:4px;color:#aaa}
.tb.win{background:var(--cwb);border-color:#a5d6a7}.tb.win .cls{color:var(--cw)}.tb.win .sc{color:var(--cw)}
.tb.lose{background:var(--clb);border-color:#f5c6c6}.tb.lose .cls{color:var(--cl)}.tb.lose .sc{color:var(--cl)}
.tb.draw-t{background:var(--cdb);border-color:#90caf9}.tb.draw-t .sc{color:var(--cd)}
.vs{font-size:13px;font-weight:700;color:#aaa;display:flex;align-items:center;padding:0 2px}
.inp-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sc-inp{width:54px;padding:5px 6px;font-size:16px;text-align:center;border:1.5px solid #dde3f0;border-radius:7px;background:#fff;color:#1a1a2e;font-family:inherit;font-weight:700}
.sc-inp:focus{outline:none;border-color:var(--cp)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:700}
.bw{background:var(--cwb);color:var(--cw)}.bl{background:var(--clb);color:var(--cl)}.bd{background:var(--cdb);color:var(--cd)}.by{background:var(--cyb);color:var(--cy)}

.win-pick-btn{padding:5px 12px;font-size:12px;font-weight:600;border:1.5px solid #dde3f0;border-radius:7px;background:#f8faff;color:#555;cursor:pointer;font-family:inherit}
.win-pick-btn:hover{background:var(--cwb);border-color:var(--cw);color:var(--cw)}
.win-pick-btn.wpick-on{background:var(--cwb);border-color:var(--cw);color:var(--cw);font-weight:700}

.tot-sec p{font-size:11px;color:#888;margin-bottom:10px}

.pc .pp{font-size:22px;font-weight:700;color:var(--cp)}
.pc .pd{font-size:10px;color:#aaa;margin-top:2px}

.pc.r2c{border-color:#888780;border-width:1.5px}
.pc.r3c{border-color:#854F0B;border-width:1.5px}

.sfcard{border-radius:8px;padding:8px 6px;text-align:center;border:0.5px solid #dde3f0;background:#f8faff}
.sfcard .sfc-rank{font-size:11px;color:#888;margin-bottom:2px}
.sfcard .sfc-team{font-size:13px;font-weight:700;color:#1a1a2e}

.sfcard.sfc-r2{border-color:#888780;border-width:1.5px;background:#fafafa}
.sfcard.sfc-r3{border-color:#854F0B;border-width:1.5px}
.sfcard.sfc-tbd{opacity:0.5}
.sport-icon{font-size:13px;margin-right:4px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
.ldot{width:8px;height:8px;border-radius:50%}
@media(max-width:480px){
  .hdr h1{font-size:15px}.tab{font-size:11px;padding:6px 2px}
  .tb .cls{font-size:12px}.tb .sc{font-size:17px}.date-input{width:130px}

async function seedInitialResults() {
  const results = fbData.results || {};
  for (const sport of Object.values(DEFAULT_GAMES)) {
    for (const games of Object.values(sport)) {
      for (const g of games) {
        if (g.initSa !== '' && !results[g.id]) {
          const sa = g.initSa, sb = g.initSb;
          const a = parseInt(sa), b = parseInt(sb);
          const win = a > b ? 'A' : b > a ? 'B' : 'D';
          await set(ref(db, `league2026/results/${g.id}`), {sa, sb, win});
        }
      }
    }
  }
}

function getD(id) { return (fbData.dates || {})[id] || null; }
function getR(id) { return (fbData.results || {})[id] || {sa:'', sb:'', win:''}; }
async function setD(id, val, isRain) { await set(ref(db, `league2026/dates/${id}`), {val, isRain:!!isRain}); editingDate = null; }
async function clearD(id) { await set(ref(db, `league2026/dates/${id}`), null); editingDate = null; }
async function setR(id, sa, sb) {

  let win = '';

}

/* ── 순위 계산 ── */
function calcStd(sport, grade) {
  const cls = GRADES[grade].cls;
  const games = (DEFAULT_GAMES[sport]||{})[grade] || [];
  const st = {};
  cls.forEach(c => { st[c] = {w:0,d:0,l:0,pts:0,gf:0,ga:0}; });
  games.filter(g => g.type === '예선').forEach(g => {
    if (!st[g.a] || !st[g.b]) return;
    const r = getR(g.id);
    if (!r.win) return;
    const sa = parseInt(r.sa), sb = parseInt(r.sb);
    if (isNaN(sa)||isNaN(sb)) return;
    st[g.a].gf+=sa; st[g.a].ga+=sb;
    st[g.b].gf+=sb; st[g.b].ga+=sa;
    if (r.win==='A'){st[g.a].w++;st[g.a].pts+=3;st[g.b].l++;}
    else if (r.win==='B'){st[g.b].w++;st[g.b].pts+=3;st[g.a].l++;}
    else {st[g.a].d++;st[g.a].pts++;st[g.b].d++;st[g.b].pts++;}
  });
  return cls.map(c=>({cls:c,...st[c]})).sort((a,b)=>b.pts-a.pts||b.w-a.w||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

function calcSportFinal(sport, grade) {
  // 레이저런은 별도 순위 입력 사용
  if (sport === '레이저런') {
    const lr = (fbData.laser_rank || {})[`g${grade}`] || {};
    const cls = GRADES[grade].cls;
    const ranks = [lr.r1||null, lr.r2||null, lr.r3||null, lr.r4||null].slice(0, cls.length);
    const done = ranks.filter(Boolean).length >= (cls.length >= 4 ? 4 : 3);
    return {ranks, finDone: done, sfDone: done, hasSf: cls.length >= 4};
  }
  // 결승/3,4위전 결과로 종목 최종 순위 반환
  const games = (DEFAULT_GAMES[sport]||{})[grade] || [];
  const fin = games.find(g => g.type === '결승');
  const sf  = games.find(g => g.type === '3,4위전');

  // 예선 순위 (fallback)
  const preRank = calcStd(sport, grade);

  // 결승 결과
  let rank1=null, rank2=null, rank3=null, rank4=null;
  if (fin && fin.b) {
    const r = getR(fin.id);
    if (r.win==='A')      { rank1=fin.a; rank2=fin.b; }
    else if (r.win==='B') { rank1=fin.b; rank2=fin.a; }
  }
  // 3,4위전 결과
  if (sf && sf.b) {
    const r = getR(sf.id);
    if (r.win==='A')      { rank3=sf.a; rank4=sf.b; }
    else if (r.win==='B') { rank3=sf.b; rank4=sf.a; }
  }

  // 결승/3,4위전 없는 경우 예선 순위로 채움
  const cls = GRADES[grade].cls;
  if (!rank1 && preRank[0]) rank1 = preRank[0].cls;
  if (!rank2 && preRank[1]) rank2 = preRank[1].cls;
  if (cls.length >= 3 && !rank3 && preRank[2]) rank3 = preRank[2].cls;
  if (cls.length >= 4 && !rank4 && preRank[3]) rank4 = preRank[3].cls;

  const hasFinResult = !!getR(fin?.id||'').win;
  const hasSfResult  = sf ? !!getR(sf.id).win : true;

  return {
    ranks: [rank1, rank2, rank3, rank4],
    finDone: hasFinResult,
    sfDone: hasSfResult,
    hasSf: !!sf
  };
}

function calcTot(grade) {
  const cls = GRADES[grade].cls;
  const tot = {}; cls.forEach(c=>{tot[c]=0;});
  const rankPts = [4,3,2,1];
  ['피구','티볼','배구','레이저런'].forEach(sp => {
    if (!DEFAULT_GAMES[sp]) return;
    const {ranks} = calcSportFinal(sp, grade);
    ranks.forEach((cls2, i) => {
      if (cls2 && tot[cls2]!==undefined) tot[cls2] += rankPts[i]||1;
    });
  });
  return cls.map(c=>({cls:c,pts:tot[c]})).sort((a,b)=>b.pts-a.pts);
}

function renderStd(sport, grade) {
  const rows = calcStd(sport, grade);
  let h = `<div class="std-wrap"><table class="std-tbl"><thead><tr>
    <th style="width:38px">순위</th><th>반</th>
    <th style="width:30px">승</th><th style="width:30px">무</th><th style="width:30px">패</th>
    <th style="width:36px">득점</th><th style="width:36px">실점</th><th style="width:36px">득실</th><th style="width:36px">승점</th>
  </tr></thead><tbody>`;
  rows.forEach((r,i) => {
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    h+=`<tr><td class="${rc}">${med}${i+1}</td><td class="tnm">${grade}학년 ${r.cls}</td>
      <td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
      <td>${r.gf}</td><td>${r.ga}</td><td style="color:${r.gf-r.ga>0?'var(--cw)':r.gf-r.ga<0?'var(--cl)':'#888'}">${r.gf-r.ga>0?'+':''}${r.gf-r.ga}</td><td style="font-weight:700">${r.pts}</td></tr>`;
  });
  return h + `</tbody></table></div>`;
}

function renderGame(g, grade) {
  const r = getR(g.id);
  const dInfo = getD(g.id);
  const dispDate = dInfo ? dInfo.val : g.orig;
  const changed = !!dInfo;
  const isRain = dInfo && dInfo.isRain;
  const canScore = !!g.b;

  let tac='tb', tbc='tb';
  if (r.win==='A'){tac+=' win';tbc+=' lose';}
  else if (r.win==='B'){tac+=' lose';tbc+=' win';}
  else if (r.win==='D'){tac+=' draw-t';tbc+=' draw-t';}

  let sbadge = `<span class="sbadge by">미정</span>`;
  if (r.win==='A') sbadge = `<span class="sbadge bw">${grade}학년 ${g.a} 승</span>`;
  else if (r.win==='B') sbadge = `<span class="sbadge bw">${grade}학년 ${g.b} 승</span>`;
  else if (r.win==='D') sbadge = `<span class="sbadge bd">무승부</span>`;

  const typeCls = g.type==='예선'?'b-pre':g.type==='결승'?'b-fin':'b-sf';
  const isDone = r.win !== '';
  const isFinal = g.type === '결승' || g.type === '3,4위전';

  let dateEditHtml = '';
  if (isAdmin && editingDate === g.id) {
    dateEditHtml = `<div class="date-edit-row">
      <input class="date-input" id="di_${g.id}" type="text" placeholder="예: 4월 10일(금)" value="${dispDate}">
      <label class="rain-chk">
        <input type="checkbox" id="rain_${g.id}" ${isRain?'checked':''}> 🌧️ 우천 변경
      </label>
      <button class="save-btn" onclick="saveDate('${g.id}')">저장</button>
      ${changed?`<button class="cancel-btn" onclick="restoreDate('${g.id}')">원복</button>`:''}
      <button class="cancel-btn" onclick="cancelDateEdit()">취소</button>
    </div>`;

  let scoreHtml = '';
  if (!canScore) {
    scoreHtml = `<div class="inp-row"><span class="viewer-score">일정 추후 공지</span></div>`;
  } else if (isAdmin) {
    if (isFinal) {
      const winA = r.win==='A', winB = r.win==='B';
      scoreHtml = `<div class="inp-row" style="flex-wrap:wrap;gap:6px">
        <span style="font-size:11px;color:#888">승리팀 선택:</span>
        <button class="win-pick-btn${winA?' wpick-on':''}" onclick="pickWinner('${g.id}','A')">${grade}학년 ${g.a} 승</button>
        <button class="win-pick-btn${winB?' wpick-on':''}" onclick="pickWinner('${g.id}','B')">${grade}학년 ${g.b} 승</button>
        ${isDone?`<button class="cancel-btn" style="font-size:11px" onclick="clearWinner('${g.id}')">초기화</button>`:''}
      </div>`;
    } else {
      scoreHtml = `<div class="inp-row">
        <span style="font-size:11px;color:#888">결과 입력:</span>
        <input class="sc-inp" type="number" min="0" id="sa_${g.id}" value="${r.sa}" placeholder="0">
        <span style="font-size:13px;color:#aaa">:</span>
        <input class="sc-inp" type="number" min="0" id="sb_${g.id}" value="${r.sb}" placeholder="0">
        <button class="save-btn" onclick="doSaveScore('${g.id}')">저장</button>
        ${sbadge}
      </div>`;
    }
  } else {
    if (isFinal) {
      scoreHtml = isDone
        ? `<div class="inp-row">${sbadge}</div>`
        : `<div class="inp-row"><span class="viewer-score">경기 결과 대기 중</span></div>`;
    } else {
      scoreHtml = isDone
        ? `<div class="inp-row">${sbadge}${r.sa!==''?`<span style="font-size:13px;color:#555;font-weight:700;margin-left:4px">${r.sa} : ${r.sb}</span>`:''}</div>`
        : `<div class="inp-row"><span class="viewer-score">경기 결과 대기 중</span></div>`;
    }
  }

  let editBtnHtml = isAdmin
    ? `<button class="edit-btn" onclick="toggleDateEdit('${g.id}')">✏️ 일정 수정</button>

    : '';

      </div>

      <div class="${tbc}">

        ${canScore&&!isFinal?`<div class="sc">${r.sb!==''?r.sb:'-'}</div>`:''}
      </div>
    </div>
    ${scoreHtml}
  </div>`;
}

function renderTot() {

    {

    }

    // ── 종합 순위 ──
    const tot = calcTot(g);
    h += `<div style="border-top:0.5px solid #eef0f6;margin-top:4px;padding-top:12px">
      <h3 style="margin-bottom:6px">${g}학년 종합 순위</h3>
      <p style="font-size:11px;color:#888;margin-bottom:10px">종목별 순위 점수 합산 (1위=4점 · 2위=3점 · 3위=2점 · 4위=1점)</p>
      <div class="pgrid">`;
    tot.forEach((row,i) => {
      const rc=i===0?'r1c':i===1?'r2c':i===2?'r3c':'';
      const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      h+=`<div class="pc ${rc}">
        <div class="pr">${med} ${i+1}위</div>
        <div class="pt">${g}학년 ${row.cls}</div>
        <div class="pp">${row.pts}점</div>
        <div class="pd">/ 최대 ${cls.length===3?12:16}점</div>
      </div>`;
    });
    h += `</div></div></div>`;
  });
  return h + `</div>`;
}

function render() {
  const sports = ['티볼','배구','피구','종합'];
  const icons = {티볼:'⚾',배구:'🏐',피구:'🔴',종합:'📊'};
  document.getElementById('tabs').innerHTML = sports.map(s =>
    `<button class="tab${curSport===s?' on':''}" onclick="selSport('${s}')">${icons[s]} ${s}</button>`
  ).join('');

  const el = document.getElementById('main');
  if (curSport === '종합') { el.innerHTML = renderTot(); return; }

  const gkeys = Object.keys(DEFAULT_GAMES[curSport]||{}).map(Number);
  let h = `<div class="gbtn-row">${gkeys.map(g =>
    `<button class="gbtn${curGrade===g?' on':''}" onclick="selGrade(${g})">${g}학년</button>`
  ).join('')}</div>`;

  const all = (DEFAULT_GAMES[curSport]||{})[curGrade] || [];
  const pre = all.filter(g => g.type === '예선');
  const rest = all.filter(g => g.type !== '예선');

  if (pre.some(g => GRADES[curGrade].cls.includes(g.a))) {
    h += `<div class="sec-title">📋 ${curGrade}학년 예선 순위표</div>${renderStd(curSport,curGrade)}`;
  }

  const adminNote = isAdmin ? '<small>— ✏️ 버튼으로 일정 수정 가능</small>' : '';
  h += `<div class="sec-title">📅 예선 경기 일정/결과 ${adminNote}</div>`;
  h += `<div class="legend">
    <span class="legend-item"><span class="ldot" style="background:var(--cw)"></span>승리</span>
    <span class="legend-item"><span class="ldot" style="background:var(--cl)"></span>패배</span>
    <span class="legend-item"><span class="ldot" style="background:var(--cd)"></span>무승부</span>
    <span class="legend-item"><span class="ldot" style="background:#ccc"></span>미정</span>
  </div>`;
  h += `<div class="glist">${pre.map(g => renderGame(g, curGrade)).join('')}</div>`;

  if (rest.length) {
    h += `<div class="sec-title">🏆 결선 경기</div>
      <div class="glist">${rest.map(g => renderGame(g, curGrade)).join('')}</div>`;
  }
  el.innerHTML = h;
}

window.selSport = (s) => { curSport=s; curGrade=1; editingDate=null; render(); };
window.selGrade = (g) => { curGrade=g; editingDate=null; render(); };
window.toggleDateEdit = (id) => { editingDate=editingDate===id?null:id; render(); };
window.cancelDateEdit = () => { editingDate=null; render(); };
window.saveDate = async (id) => {
  const v = document.getElementById('di_'+id)?.value?.trim()||'';
  const rain = document.getElementById('rain_'+id)?.checked||false;
  if (v) await setD(id,v,rain);
};
window.restoreDate = async (id) => { await clearD(id); };
window.saveLaserRank = async (grade, rankNum) => {
  const sel = document.getElementById(`lr_${grade}_${rankNum}`);
  if (!sel) return;
  const val = sel.value;
  await set(ref(db, `league2026/laser_rank/g${grade}/r${rankNum}`), val || null);
};
window.pickWinner = async (id, side) => {
  const win = side;
  await set(ref(db, `league2026/results/${id}`), {sa:'', sb:'', win});
};
window.clearWinner = async (id) => {
  await set(ref(db, `league2026/results/${id}`), {sa:'', sb:'', win:''});
};
window.doSaveScore = async (id) => {
  const sa = document.getElementById('sa_'+id)?.value||'';
  const sb = document.getElementById('sb_'+id)?.value||'';
  await setR(id,sa,sb);
};
</script>
</body>
</html>
